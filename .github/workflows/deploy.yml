name: Deploy to VPS

on:
  push:
    branches: [production]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Run tests
        run: yarn test:run

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: pducasse/philocircus:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.OVH_IP }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_KEY }}
          script: |
            docker network create philocircus_net || true
            docker pull pducasse/philocircus:latest
            docker stop philocircus || true
            docker rm philocircus || true
            docker run -d \
              -p 3000:3000 \
              --network philocircus_net \
              --name philocircus \
              -e NUXT_API_URL=${{ secrets.NUXT_API_URL }} \
              -e NUXT_PUBLIC_API_URL=${{ secrets.NUXT_PUBLIC_API_URL }} \
              pducasse/philocircus:latest
